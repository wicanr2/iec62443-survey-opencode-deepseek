<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" width="640" height="520" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="640" height="520" fill="#fff"/>
  <text x="320" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">P7 安全更新信任鏈</text>
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker></defs>

  <!-- Dev -->
  <rect x="180" y="55" width="280" height="45" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
  <text x="320" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">開發者簽章 (dev key)</text>
  <text x="320" y="92" text-anchor="middle" font-size="9" fill="#999">開發者本地簽署 commit</text>
  <line x1="320" y1="100" x2="320" y2="130" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- Build -->
  <rect x="180" y="135" width="280" height="45" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
  <text x="320" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">Build Server 簽章 (build key)</text>
  <text x="320" y="172" text-anchor="middle" font-size="9" fill="#999">CI 環境自動簽署</text>
  <line x1="320" y1="180" x2="320" y2="210" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- Release -->
  <rect x="180" y="215" width="280" height="45" rx="8" fill="#f9ebea" stroke="#c0392b" stroke-width="1.5"/>
  <text x="320" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">發布伺服器簽章 (release key)</text>
  <text x="320" y="252" text-anchor="middle" font-size="9" fill="#999">offline HSM 保護的 release key</text>
  <line x1="320" y1="260" x2="320" y2="290" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- Delivery -->
  <rect x="180" y="295" width="280" height="36" rx="6" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.2"/>
  <text x="320" y="318" text-anchor="middle" font-size="12" fill="#2980b9" font-weight="bold">patch.tgz + .sig 分開傳輸</text>
  <line x1="320" y1="331" x2="320" y2="360" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- Device verify -->
  <rect x="140" y="365" width="360" height="50" rx="8" fill="#e8f8f5" stroke="#27ae60" stroke-width="1.5"/>
  <text x="320" y="385" text-anchor="middle" font-size="12" fill="#27ae60" font-weight="bold">設備下載 → 驗證 release 簽章 → 驗證 build 簽章</text>
  <text x="320" y="404" text-anchor="middle" font-size="9" fill="#555">解開套用</text>
  <line x1="320" y1="415" x2="320" y2="445" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- Boot -->
  <rect x="140" y="450" width="360" height="45" rx="8" fill="#e8f8f5" stroke="#27ae60" stroke-width="1.5"/>
  <text x="320" y="470" text-anchor="middle" font-size="12" fill="#27ae60" font-weight="bold">Bootloader 驗證 firmware 簽章 → 檢查 anti-rollback counter</text>
  <text x="320" y="488" text-anchor="middle" font-size="9" fill="#555">開機 ✓</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="500" height="350" fill="#fff"/>
  <text x="250" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">金鑰分層管理 (FR4 DC)</text>
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker></defs>

  <!-- Root Key -->
  <rect x="100" y="55" width="300" height="55" rx="10" fill="#2c3e50"/>
  <text x="250" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Root Key</text>
  <text x="250" y="100" text-anchor="middle" font-size="9" fill="#ccc">存於 SE / HSM，永不出晶片</text>

  <line x1="250" y1="110" x2="250" y2="140" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- Two branches -->
  <rect x="40" y="145" width="190" height="50" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
  <text x="135" y="168" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">Key Encryption Key (KEK)</text>
  <text x="135" y="186" text-anchor="middle" font-size="9" fill="#555">加密 Data Key 用</text>

  <rect x="270" y="145" width="190" height="50" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="365" y="168" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">Signing Key</text>
  <text x="365" y="186" text-anchor="middle" font-size="9" fill="#555">簽章用，與加密金鑰分開</text>

  <line x1="135" y1="195" x2="135" y2="220" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- DEK -->
  <rect x="40" y="225" width="190" height="50" rx="8" fill="#e8f8f5" stroke="#27ae60" stroke-width="1.5"/>
  <text x="135" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">Data Encryption Key (DEK)</text>
  <text x="135" y="266" text-anchor="middle" font-size="9" fill="#555">加密實際資料，可頻繁輪替</text>

  <!-- Principles box -->
  <rect x="40" y="295" width="420" height="40" rx="6" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="250" y="313" text-anchor="middle" font-size="9" fill="#777">DEK 洩漏 → 不洩漏 KEK | KEK 洩漏 → 不洩漏 Root Key | Root Key 永不離開 SE</text>
  <text x="250" y="328" text-anchor="middle" font-size="8" fill="#999">最小洩漏半徑：每層金鑰只保護下一層</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" width="700" height="360" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="700" height="360" fill="#fff"/>
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">ISASecure 認證三階段路徑</text>
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#e67e22"/></marker></defs>

  <line x1="162" y1="85" x2="222" y2="85" stroke="#e67e22" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="384" y1="85" x2="464" y2="85" stroke="#e67e22" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- Phase 1 -->
  <rect x="20" y="50" width="140" height="70" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="90" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#2980b9">階段 1: SDLA</text>
  <text x="90" y="98" text-anchor="middle" font-size="9" fill="#555">投資開發流程 (P1-P8)</text>
  <text x="90" y="112" text-anchor="middle" font-size="8" fill="#999">3-6 個月</text>

  <!-- Phase 2 -->
  <rect x="230" y="50" width="140" height="70" rx="10" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
  <text x="300" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">階段 2: CSA</text>
  <text x="300" y="98" text-anchor="middle" font-size="9" fill="#555">旗艦產品送 CSA</text>
  <text x="300" y="112" text-anchor="middle" font-size="8" fill="#999">2-4 個月</text>

  <!-- Phase 3 -->
  <rect x="470" y="50" width="210" height="70" rx="10" fill="#e8f8f5" stroke="#27ae60" stroke-width="1.5"/>
  <text x="575" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">階段 3: 產品線 / SSA</text>
  <text x="575" y="98" text-anchor="middle" font-size="9" fill="#555">其他產品 CSA 或系統級 SSA</text>

  <!-- Details -->
  <rect x="20" y="145" width="660" height="200" rx="8" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="35" y="172" font-size="12" font-weight="bold" fill="#2c3e50">各階段重點工作</text>

  <rect x="35" y="185" width="190" height="28" rx="5" fill="#eaf2f8"/>
  <text x="130" y="204" text-anchor="middle" font-size="10" fill="#2980b9">P1 指定安全負責人 + 書面政策</text>
  <rect x="35" y="218" width="190" height="28" rx="5" fill="#eaf2f8"/>
  <text x="130" y="237" text-anchor="middle" font-size="10" fill="#2980b9">P2 對主力產品做 threat model</text>
  <rect x="35" y="251" width="190" height="28" rx="5" fill="#eaf2f8"/>
  <text x="130" y="270" text-anchor="middle" font-size="10" fill="#2980b9">P4 導入 SAST</text>
  <rect x="35" y="284" width="190" height="28" rx="5" fill="#eaf2f8"/>
  <text x="130" y="303" text-anchor="middle" font-size="10" fill="#2980b9">P6 建立漏洞通報流程</text>

  <rect x="235" y="185" width="190" height="28" rx="5" fill="#fdf2e9"/>
  <text x="330" y="204" text-anchor="middle" font-size="10" fill="#e67e22">選旗艦產品送 CSA 認證</text>
  <rect x="235" y="218" width="190" height="28" rx="5" fill="#fdf2e9"/>
  <text x="330" y="237" text-anchor="middle" font-size="10" fill="#e67e22">用 SDLA 證書省 4-1 重複審查</text>
  <rect x="235" y="251" width="190" height="28" rx="5" fill="#fdf2e9"/>
  <text x="330" y="270" text-anchor="middle" font-size="10" fill="#e67e22">備齊 FSA-C 自評表 + 測試報告</text>

  <rect x="435" y="185" width="230" height="28" rx="5" fill="#e8f8f5"/>
  <text x="550" y="204" text-anchor="middle" font-size="10" fill="#27ae60">產品線擴張認證 (CSA × N)</text>
  <rect x="435" y="218" width="230" height="28" rx="5" fill="#e8f8f5"/>
  <text x="550" y="237" text-anchor="middle" font-size="10" fill="#27ae60">或走向系統級認證 (SSA)</text>
</svg>

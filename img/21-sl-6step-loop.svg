<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="860" height="200" fill="#fff"/>
  <text x="430" y="25" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">SL 達成六步驟閉環</text>
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#e67e22"/></marker></defs>

  <!-- Step boxes -->
  <rect x="10" y="50" width="125" height="50" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="72" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">定義 SUC</text>
  <text x="72" y="90" text-anchor="middle" font-size="8" fill="#555">步驟 1</text>

  <line x1="135" y1="75" x2="148" y2="75" stroke="#e67e22" stroke-width="2.5" marker-end="url(#a)"/>

  <rect x="152" y="50" width="130" height="50" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="217" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">劃分 Zone &amp; Conduit</text>
  <text x="217" y="90" text-anchor="middle" font-size="8" fill="#555">步驟 2</text>

  <line x1="282" y1="75" x2="295" y2="75" stroke="#e67e22" stroke-width="2.5" marker-end="url(#a)"/>

  <rect x="299" y="50" width="130" height="50" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
  <text x="364" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">風險評估定 SL-T</text>
  <text x="364" y="90" text-anchor="middle" font-size="8" fill="#555">步驟 3</text>

  <line x1="429" y1="75" x2="442" y2="75" stroke="#e67e22" stroke-width="2.5" marker-end="url(#a)"/>

  <rect x="446" y="50" width="140" height="50" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
  <text x="516" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">挑選組件 (SL-C≥SL-T)</text>
  <text x="516" y="90" text-anchor="middle" font-size="8" fill="#555">步驟 4</text>

  <line x1="586" y1="75" x2="599" y2="75" stroke="#e67e22" stroke-width="2.5" marker-end="url(#a)"/>

  <rect x="603" y="50" width="120" height="50" rx="8" fill="#e8f8f5" stroke="#27ae60" stroke-width="1.5"/>
  <text x="663" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">部署驗收 (SL-A)</text>
  <text x="663" y="90" text-anchor="middle" font-size="8" fill="#555">步驟 5</text>

  <line x1="723" y1="75" x2="736" y2="75" stroke="#e67e22" stroke-width="2.5" marker-end="url(#a)"/>

  <rect x="740" y="50" width="110" height="50" rx="8" fill="#e8f8f5" stroke="#27ae60" stroke-width="1.5"/>
  <text x="795" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">營運監控</text>
  <text x="795" y="90" text-anchor="middle" font-size="8" fill="#555">步驟 6</text>

  <!-- Owner labels below -->
  <text x="72" y="130" text-anchor="middle" font-size="8" fill="#7f8c8d">Asset Owner</text>
  <text x="217" y="130" text-anchor="middle" font-size="8" fill="#7f8c8d">Asset Owner</text>
  <text x="364" y="130" text-anchor="middle" font-size="8" fill="#7f8c8d">Asset Owner</text>
  <text x="516" y="130" text-anchor="middle" font-size="8" fill="#7f8c8d">System Integrator</text>
  <text x="516" y="143" text-anchor="middle" font-size="7" fill="#bbb">+ Product Supplier</text>
  <text x="663" y="130" text-anchor="middle" font-size="8" fill="#7f8c8d">System Integrator</text>
  <text x="795" y="130" text-anchor="middle" font-size="8" fill="#7f8c8d">Asset Owner</text>

  <!-- Loopback arrow -->
  <path d="M795,160 Q795,180 430,180 Q10,180 10,155 Q10,130 10,115" fill="none" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="420" y="193" text-anchor="middle" font-size="9" fill="#7f8c8d">持續循環：營運發現的新威脅 → 重新評估 SL-T</text>
</svg>

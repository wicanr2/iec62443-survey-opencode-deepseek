<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" width="520" height="560" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="520" height="560" fill="#fff"/>
  <text x="260" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Secure Boot 信任鏈</text>
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/></marker></defs>

  <!-- Root of Trust -->
  <rect x="60" y="55" width="400" height="65" rx="10" fill="#2c3e50"/>
  <text x="260" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">HW Root of Trust</text>
  <text x="260" y="102" text-anchor="middle" font-size="10" fill="#ccc">Boot ROM / OTP / eFuse — 不可修改的起點</text>

  <line x1="260" y1="120" x2="260" y2="155" stroke="#c0392b" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="275" y="142" font-size="9" fill="#c0392b">驗證簽章</text>

  <!-- BL Stage 1 -->
  <rect x="60" y="160" width="400" height="65" rx="10" fill="#fdf2e9" stroke="#e67e22" stroke-width="2"/>
  <text x="260" y="187" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67e22">Bootloader Stage 1</text>
  <text x="260" y="207" text-anchor="middle" font-size="10" fill="#555">最小化：只做簽章驗證 + 載入下一層</text>

  <line x1="260" y1="225" x2="260" y2="260" stroke="#c0392b" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="275" y="247" font-size="9" fill="#c0392b">驗證簽章</text>

  <!-- BL Stage 2 -->
  <rect x="60" y="265" width="400" height="65" rx="10" fill="#fdf2e9" stroke="#e67e22" stroke-width="2"/>
  <text x="260" y="292" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67e22">Bootloader Stage 2 / RTOS</text>
  <text x="260" y="312" text-anchor="middle" font-size="10" fill="#555">完整 bootloader / 小型 RTOS kernel</text>

  <line x1="260" y1="330" x2="260" y2="365" stroke="#c0392b" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="275" y="352" font-size="9" fill="#c0392b">驗證簽章</text>

  <!-- App FW -->
  <rect x="60" y="370" width="400" height="65" rx="10" fill="#e8f8f5" stroke="#27ae60" stroke-width="2"/>
  <text x="260" y="397" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">Application Firmware</text>
  <text x="260" y="417" text-anchor="middle" font-size="10" fill="#555">執行應用邏輯的控制程式</text>

  <line x1="260" y1="435" x2="260" y2="465" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="275" y="455" font-size="9" fill="#999">可選</text>

  <!-- Config -->
  <rect x="140" y="470" width="240" height="50" rx="8" fill="#fafafa" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="260" y="493" text-anchor="middle" font-size="12" fill="#7f8c8d">Config / Parameters (optional)</text>

  <!-- Trust direction arrow on left -->
  <text x="15" y="310" font-size="11" font-weight="bold" fill="#c0392b" transform="rotate(-90,15,310)">信任起始點 (不可修改)</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="700" height="320" fill="#fff"/>
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">合規補強 Roadmap (18 個月)</text>

  <!-- Phase 1 -->
  <rect x="20" y="55" width="200" height="240" rx="8" fill="#e8f8f5" stroke="#27ae60" stroke-width="1.5"/>
  <text x="120" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">0-6 個月</text>
  <text x="120" y="103" text-anchor="middle" font-size="11" fill="#555">Quick Wins + P0</text>
  <line x1="35" y1="113" x2="205" y2="113" stroke="#27ae60" stroke-width="0.5"/>
  <text x="35" y="135" font-size="10" fill="#555">P0: DevMode=false</text>
  <text x="35" y="155" font-size="10" fill="#555">pprof 收斂</text>
  <text x="35" y="175" font-size="10" fill="#555">CORS 白名單</text>
  <text x="35" y="195" font-size="10" fill="#555">換 JWT 套件</text>
  <text x="35" y="215" font-size="10" fill="#555">CI 加弱點掃描</text>
  <text x="35" y="240" font-size="9" fill="#999">→ gap 收斂報告 v1</text>

  <!-- Phase 2 -->
  <rect x="240" y="55" width="200" height="240" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
  <text x="340" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">6-12 個月</text>
  <text x="340" y="103" text-anchor="middle" font-size="11" fill="#555">P1 傳輸與身分</text>
  <line x1="255" y1="113" x2="425" y2="113" stroke="#e67e22" stroke-width="0.5"/>
  <text x="255" y="135" font-size="10" fill="#555">全鏈路 TLS 1.2+</text>
  <text x="255" y="155" font-size="10" fill="#555">x509 裝置憑證</text>
  <text x="255" y="175" font-size="10" fill="#555">RBAC 三角色</text>
  <text x="255" y="195" font-size="10" fill="#555">FW 簽章驗證</text>
  <text x="255" y="215" font-size="10" fill="#555">cookie Secure flag</text>
  <text x="255" y="240" font-size="9" fill="#999">→ 可送 SDLA 文件包</text>

  <!-- Phase 3 -->
  <rect x="460" y="55" width="220" height="240" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="570" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#2980b9">12-18 個月</text>
  <text x="570" y="103" text-anchor="middle" font-size="11" fill="#555">P2 縱深與流程</text>
  <line x1="475" y1="113" x2="665" y2="113" stroke="#2980b9" stroke-width="0.5"/>
  <text x="475" y="135" font-size="10" fill="#555">Secure Boot</text>
  <text x="475" y="155" font-size="10" fill="#555">Secure Element 金鑰</text>
  <text x="475" y="175" font-size="10" fill="#555">Anti-rollback</text>
  <text x="475" y="195" font-size="10" fill="#555">安全日誌 + NTP</text>
  <text x="475" y="215" font-size="10" fill="#555">threat model 流程化</text>
  <text x="475" y="240" font-size="9" fill="#999">→ 可送 CSA 完整證據</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" width="720" height="520" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="720" height="520" fill="#fff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">安全 Code Review 流程 (P4 SImp)</text>
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker></defs>

  <!-- Start -->
  <rect x="260" y="50" width="200" height="36" rx="18" fill="#2c3e50"/>
  <text x="360" y="74" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">開發者提交 PR</text>
  <line x1="360" y1="86" x2="360" y2="110" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- SAST -->
  <rect x="260" y="115" width="200" height="36" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="360" y="139" text-anchor="middle" font-size="12" fill="#2980b9" font-weight="bold">SAST 靜態分析</text>
  <line x1="360" y1="151" x2="360" y2="175" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- SAST results -->
  <rect x="100" y="180" width="160" height="30" rx="6" fill="#f9ebea" stroke="#c0392b" stroke-width="1"/>
  <text x="180" y="200" text-anchor="middle" font-size="10" fill="#c0392b">hardcoded secret → block</text>
  <rect x="280" y="180" width="160" height="30" rx="6" fill="#f9ebea" stroke="#c0392b" stroke-width="1"/>
  <text x="360" y="200" text-anchor="middle" font-size="10" fill="#c0392b">buffer overflow → block</text>
  <rect x="460" y="180" width="160" height="30" rx="6" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="540" y="200" text-anchor="middle" font-size="10" fill="#27ae60">通過 → 繼續</text>

  <line x1="180" y1="175" x2="180" y2="180" stroke="#c0392b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="360" y1="175" x2="360" y2="180" stroke="#555" stroke-width="1.5"/>
  <line x1="540" y1="175" x2="540" y2="180" stroke="#27ae60" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Dependency scan -->
  <rect x="260" y="225" width="200" height="36" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="360" y="249" text-anchor="middle" font-size="12" fill="#2980b9" font-weight="bold">依賴掃描 (已知 CVE)</text>
  <line x1="360" y1="261" x2="360" y2="285" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="190" y="290" width="160" height="30" rx="6" fill="#f9ebea" stroke="#c0392b" stroke-width="1"/>
  <text x="270" y="310" text-anchor="middle" font-size="10" fill="#c0392b">high/critical CVE → block</text>
  <rect x="370" y="290" width="160" height="30" rx="6" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="450" y="310" text-anchor="middle" font-size="10" fill="#27ae60">通過 → 進入 human review</text>

  <line x1="270" y1="285" x2="270" y2="290" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="450" y1="285" x2="450" y2="290" stroke="#27ae60" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Human review -->
  <rect x="260" y="335" width="200" height="36" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
  <text x="360" y="359" text-anchor="middle" font-size="12" fill="#e67e22" font-weight="bold">人工 Review</text>
  <line x1="360" y1="371" x2="360" y2="395" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="120" y="400" width="140" height="28" rx="6" fill="#fafafa" stroke="#7f8c8d" stroke-width="1"/>
  <text x="190" y="419" text-anchor="middle" font-size="10" fill="#555">一般邏輯審查</text>
  <rect x="280" y="400" width="160" height="28" rx="6" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="360" y="419" text-anchor="middle" font-size="10" fill="#2980b9">安全 code → champion 審查</text>
  <rect x="460" y="400" width="140" height="28" rx="6" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="530" y="419" text-anchor="middle" font-size="10" fill="#27ae60">通過 → merge</text>

  <line x1="190" y1="395" x2="190" y2="400" stroke="#555" stroke-width="1.5"/>
  <line x1="360" y1="395" x2="360" y2="400" stroke="#555" stroke-width="1.5"/>
  <line x1="530" y1="395" x2="530" y2="400" stroke="#555" stroke-width="1.5"/>

  <!-- Legend -->
  <rect x="40" y="460" width="640" height="45" rx="6" fill="#f4f6f6" stroke="#ddd" stroke-width="1"/>
  <rect x="55" y="475" width="14" height="14" rx="3" fill="#f9ebea" stroke="#c0392b" stroke-width="0.8"/><text x="74" y="487" font-size="9" fill="#555">block merge</text>
  <rect x="155" y="475" width="14" height="14" rx="3" fill="#e8f8f5" stroke="#27ae60" stroke-width="0.8"/><text x="174" y="487" font-size="9" fill="#555">通過</text>
  <rect x="245" y="475" width="14" height="14" rx="3" fill="#eaf2f8" stroke="#2980b9" stroke-width="0.8"/><text x="264" y="487" font-size="9" fill="#555">自動化門禁</text>
  <rect x="365" y="475" width="14" height="14" rx="3" fill="#fdf2e9" stroke="#e67e22" stroke-width="0.8"/><text x="384" y="487" font-size="9" fill="#555">人工審查</text>
  <rect x="485" y="475" width="14" height="14" rx="3" fill="#fafafa" stroke="#7f8c8d" stroke-width="0.8"/><text x="504" y="487" font-size="9" fill="#555">一般流程</text>
</svg>

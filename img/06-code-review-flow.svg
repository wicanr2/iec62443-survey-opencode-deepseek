<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" width="720" height="520" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="720" height="520" fill="#fff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">安全 Code Review 流程 (P4 SImp)</text>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker>
    <marker id="red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/></marker>
    <marker id="green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#27ae60"/></marker>
  </defs>

  <!-- PR -->
  <rect x="260" y="50" width="200" height="36" rx="18" fill="#2c3e50"/>
  <text x="360" y="74" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">開發者提交 PR</text>
  <line x1="360" y1="86" x2="360" y2="110" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- SAST -->
  <rect x="260" y="115" width="200" height="36" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="360" y="139" text-anchor="middle" font-size="12" fill="#2980b9" font-weight="bold">SAST 靜態分析</text>
  <line x1="360" y1="151" x2="360" y2="175" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- SAST: 3 result boxes -->
  <rect x="60" y="180" width="160" height="30" rx="6" fill="#f9ebea" stroke="#c0392b" stroke-width="1"/>
  <text x="140" y="200" text-anchor="middle" font-size="10" fill="#c0392b">hardcoded secret → block</text>
  <rect x="240" y="180" width="160" height="30" rx="6" fill="#f9ebea" stroke="#c0392b" stroke-width="1"/>
  <text x="320" y="200" text-anchor="middle" font-size="10" fill="#c0392b">buffer overflow → block</text>
  <rect x="420" y="180" width="160" height="30" rx="6" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="500" y="200" text-anchor="middle" font-size="10" fill="#27ae60">通過</text>

  <!-- Lines from SAST to result boxes -->
  <line x1="140" y1="175" x2="140" y2="180" stroke="#c0392b" stroke-width="1.5" marker-end="url(#red)"/>
  <line x1="320" y1="175" x2="320" y2="180" stroke="#c0392b" stroke-width="1.5" marker-end="url(#red)"/>
  <line x1="500" y1="175" x2="500" y2="180" stroke="#27ae60" stroke-width="1.5" marker-end="url(#green)"/>

  <!-- CONNECTION: SAST 通過 → 依賴掃描 (RIGHT side 500→360) -->
  <path d="M500,210 L500,225 L360,225" fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#green)"/>

  <!-- Dependency scan -->
  <rect x="260" y="230" width="200" height="36" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="360" y="254" text-anchor="middle" font-size="12" fill="#2980b9" font-weight="bold">依賴掃描 (已知 CVE)</text>
  <line x1="360" y1="266" x2="360" y2="295" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- Dep: 2 result boxes -->
  <rect x="150" y="300" width="170" height="30" rx="6" fill="#f9ebea" stroke="#c0392b" stroke-width="1"/>
  <text x="235" y="320" text-anchor="middle" font-size="10" fill="#c0392b">high/critical CVE → block</text>
  <rect x="370" y="300" width="170" height="30" rx="6" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="455" y="320" text-anchor="middle" font-size="10" fill="#27ae60">通過 → human review</text>

  <line x1="235" y1="295" x2="235" y2="300" stroke="#c0392b" stroke-width="1.5" marker-end="url(#red)"/>
  <line x1="455" y1="295" x2="455" y2="300" stroke="#27ae60" stroke-width="1.5" marker-end="url(#green)"/>

  <!-- CONNECTION: Dep 通過 → 人工 Review (RIGHT side 455→360) -->
  <path d="M455,330 L455,345 L360,345" fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#green)"/>

  <!-- Human review -->
  <rect x="260" y="350" width="200" height="36" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
  <text x="360" y="374" text-anchor="middle" font-size="12" fill="#e67e22" font-weight="bold">人工 Review</text>
  <line x1="360" y1="386" x2="360" y2="415" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- Review: 3 result boxes -->
  <rect x="80" y="420" width="150" height="28" rx="6" fill="#fafafa" stroke="#7f8c8d" stroke-width="1"/>
  <text x="155" y="439" text-anchor="middle" font-size="10" fill="#555">一般邏輯審查</text>
  <rect x="250" y="420" width="160" height="28" rx="6" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="330" y="439" text-anchor="middle" font-size="10" fill="#2980b9">安全 code → champion 審查</text>
  <rect x="430" y="420" width="140" height="28" rx="6" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="500" y="439" text-anchor="middle" font-size="10" fill="#27ae60">通過 → merge ✓</text>

  <line x1="155" y1="415" x2="155" y2="420" stroke="#555" stroke-width="1.5"/>
  <line x1="330" y1="415" x2="330" y2="420" stroke="#555" stroke-width="1.5"/>
  <line x1="500" y1="415" x2="500" y2="420" stroke="#27ae60" stroke-width="1.5" marker-end="url(#green)"/>

  <!-- Legend -->
  <rect x="40" y="468" width="640" height="40" rx="6" fill="#f4f6f6" stroke="#ddd" stroke-width="1"/>
  <rect x="55" y="482" width="14" height="14" rx="3" fill="#f9ebea" stroke="#c0392b" stroke-width="0.8"/><text x="74" y="494" font-size="9" fill="#555">block merge</text>
  <rect x="155" y="482" width="14" height="14" rx="3" fill="#e8f8f5" stroke="#27ae60" stroke-width="0.8"/><text x="174" y="494" font-size="9" fill="#555">通過 → 繼續</text>
  <rect x="275" y="482" width="14" height="14" rx="3" fill="#eaf2f8" stroke="#2980b9" stroke-width="0.8"/><text x="294" y="494" font-size="9" fill="#555">自動化門禁</text>
  <rect x="405" y="482" width="14" height="14" rx="3" fill="#fdf2e9" stroke="#e67e22" stroke-width="0.8"/><text x="424" y="494" font-size="9" fill="#555">人工審查</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900" height="580" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e67e22"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="580" fill="#ffffff"/>

  <!-- 標題 -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">IEC 62443 標準族全景地圖</text>

  <!-- 1-x General (頂部) -->
  <rect x="40" y="50" width="820" height="82" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
  <text x="60" y="73" font-size="14" font-weight="bold" fill="#e67e22">62443-1-x General（通用基礎）</text>
  <text x="60" y="94" font-size="11" fill="#555">-1-1 概念與模型 + SL 定義　|　-1-2 術語表(制定中)　|　-1-5 profiles 方案(2023)　|　-1-6 IIoT 應用(PAS 2025)</text>
  <text x="60" y="111" font-size="10" fill="#999">-1-3 一致性度量、-1-4 生命週期案例：制定中。角色：當字典用。開發者相關度：低</text>
  <text x="60" y="126" font-size="10" fill="#c0392b">※ SL 定義在 -1-1（非 -1-3）</text>

  <!-- 2-x Policies & Procedures (左中) -->
  <rect x="40" y="147" width="390" height="112" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="60" y="170" font-size="14" font-weight="bold" fill="#2980b9">62443-2-x Policies（安全管理）</text>
  <text x="60" y="191" font-size="11" fill="#555">-2-1 業主安全計畫 (2024 Ed.2)</text>
  <text x="60" y="208" font-size="11" fill="#555">-2-2 安全防護評等 SPR (制定中)</text>
  <text x="60" y="225" font-size="11" fill="#555">-2-3 補丁管理　|　-2-4 服務商要求</text>
  <text x="60" y="248" font-size="10" fill="#999">角色：業主/服務商流程。開發者相關度：低</text>

  <!-- 3-x System (右中) -->
  <rect x="470" y="147" width="390" height="112" rx="8" fill="#e8f8f5" stroke="#27ae60" stroke-width="1.5"/>
  <text x="490" y="170" font-size="14" font-weight="bold" fill="#27ae60">62443-3-x System（系統安全）</text>
  <text x="490" y="191" font-size="11" fill="#555">-3-1 安全技術</text>
  <text x="490" y="208" font-size="11" fill="#555">-3-2 風險評估 ZCR + SL-T 設定 (2020)</text>
  <text x="490" y="225" font-size="11" fill="#555">★★ -3-3 系統安全需求 SR (2013)</text>
  <text x="490" y="248" font-size="10" fill="#999">角色：系統整合商。開發者相關度：中</text>

  <!-- 箭頭 → 指向 4-x -->
  <line x1="450" y1="259" x2="450" y2="270" stroke="#d35400" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 4-x Component (highlight) -->
  <rect x="40" y="273" width="820" height="135" rx="8" fill="#fff8e1" stroke="#d35400" stroke-width="2.5"/>
  <text x="60" y="300" font-size="16" font-weight="bold" fill="#d35400">★★★ 62443-4-x Component（組件安全）— 軟硬體開發者必讀</text>

  <!-- 4-1 區塊 -->
  <rect x="60" y="316" width="380" height="80" rx="6" fill="#ffffff" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="80" y="339" font-size="13" font-weight="bold" fill="#e67e22">62443-4-1 安全開發生命週期 (SDLC)</text>
  <text x="80" y="359" font-size="11" fill="#555">• 安全管理　• 安全需求　• 安全設計</text>
  <text x="80" y="375" font-size="11" fill="#555">• 安全實作　• 安全測試　• 漏洞處置</text>
  <text x="80" y="391" font-size="11" fill="#555">• 補丁發布　• 安全文件化</text>

  <!-- 4-2 區塊 -->
  <rect x="460" y="316" width="380" height="80" rx="6" fill="#ffffff" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="480" y="339" font-size="13" font-weight="bold" fill="#e67e22">62443-4-2 組件技術安全要求</text>
  <text x="480" y="359" font-size="11" fill="#555">FR1 識別認證  FR2 使用控制  FR3 系統完整性</text>
  <text x="480" y="375" font-size="11" fill="#555">FR4 資料機密性  FR5 限制資料流</text>
  <text x="480" y="391" font-size="11" fill="#555">FR6 事件回應  FR7 資源可用性</text>

  <!-- 6-x Evaluation (新增) -->
  <rect x="40" y="420" width="820" height="52" rx="8" fill="#f5eef8" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="60" y="442" font-size="13" font-weight="bold" fill="#8e44ad">62443-6-x Evaluation（評估方法學）— 認證機構「怎麼評」</text>
  <text x="60" y="462" font-size="11" fill="#555">-6-1 評估 -2-4 服務商方法 (TS 2024)　|　-6-2 評估 -4-2 組件方法 (TS 2025) ← 等於 CSA 的評分表</text>

  <!-- 角色分離說明 -->
  <rect x="40" y="484" width="820" height="78" rx="8" fill="#f4f6f6" stroke="#bdc3c7" stroke-width="1"/>
  <text x="60" y="507" font-size="12" font-weight="bold" fill="#7f8c8d">角色分離：誰該看哪本</text>

  <rect x="60" y="518" width="175" height="30" rx="5" fill="#eaf2f8" stroke="#2980b9" stroke-width="0.8"/>
  <text x="147" y="537" text-anchor="middle" font-size="10" fill="#2980b9">Asset Owner（業主）→ -2-1, -3-2</text>

  <rect x="250" y="518" width="200" height="30" rx="5" fill="#e8f8f5" stroke="#27ae60" stroke-width="0.8"/>
  <text x="350" y="537" text-anchor="middle" font-size="10" fill="#27ae60">System Integrator（整合商）→ -2-4, -3-3</text>

  <rect x="465" y="518" width="210" height="30" rx="5" fill="#fff8e1" stroke="#d35400" stroke-width="1.2"/>
  <text x="570" y="537" text-anchor="middle" font-size="10" fill="#d35400">★ Product Supplier（供應商）→ -4-1, -4-2</text>

  <text x="695" y="537" font-size="10" fill="#999">三層角色 → 三套需求</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" width="760" height="440" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="760" height="440" fill="#ffffff"/>
  <text x="380" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">SL 靠 RE 逐級加嚴（例：SR 1.1 人員識別鑑別）</text>
  <text x="380" y="54" text-anchor="middle" font-size="11" fill="#888">不是換整套要求，而是同一條 SR 的門檻愈綁愈緊</text>

  <!-- staircase steps -->
  <!-- SL1 -->
  <rect x="50" y="330" width="160" height="70" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="130" y="356" text-anchor="middle" font-size="13" font-weight="bold" fill="#2980b9">SL 1</text>
  <text x="130" y="376" text-anchor="middle" font-size="10.5" fill="#555">SR 1.1 base</text>
  <text x="130" y="391" text-anchor="middle" font-size="9.5" fill="#888">能識別並鑑別人員</text>

  <!-- SL2 -->
  <rect x="215" y="258" width="160" height="142" rx="8" fill="#e8f6ec" stroke="#27ae60" stroke-width="1.5"/>
  <text x="295" y="284" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e8449">SL 2</text>
  <text x="295" y="304" text-anchor="middle" font-size="10.5" fill="#555">+ RE 1</text>
  <text x="295" y="320" text-anchor="middle" font-size="9.5" fill="#888">唯一識別</text>
  <text x="295" y="333" text-anchor="middle" font-size="9.5" fill="#888">不准共用帳號</text>

  <!-- SL3 -->
  <rect x="380" y="186" width="160" height="214" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
  <text x="460" y="212" text-anchor="middle" font-size="13" font-weight="bold" fill="#d35400">SL 3</text>
  <text x="460" y="232" text-anchor="middle" font-size="10.5" fill="#555">+ RE 2</text>
  <text x="460" y="248" text-anchor="middle" font-size="9.5" fill="#888">不可信網路存取</text>
  <text x="460" y="261" text-anchor="middle" font-size="9.5" fill="#888">要 MFA</text>

  <!-- SL4 -->
  <rect x="545" y="114" width="165" height="286" rx="8" fill="#fdecea" stroke="#c0392b" stroke-width="1.8"/>
  <text x="627" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">SL 4</text>
  <text x="627" y="160" text-anchor="middle" font-size="10.5" fill="#555">+ RE 3</text>
  <text x="627" y="176" text-anchor="middle" font-size="9.5" fill="#888">所有網路存取</text>
  <text x="627" y="189" text-anchor="middle" font-size="9.5" fill="#888">都要 MFA</text>

  <!-- threat labels above each step -->
  <text x="130" y="318" text-anchor="middle" font-size="9" fill="#aaa">防意外/誤觸</text>
  <text x="295" y="246" text-anchor="middle" font-size="9" fill="#aaa">防一般駭客</text>
  <text x="460" y="174" text-anchor="middle" font-size="9" fill="#aaa">防專精對手</text>
  <text x="627" y="102" text-anchor="middle" font-size="9" fill="#aaa">防國家級</text>

  <!-- rising arrow -->
  <line x1="60" y1="418" x2="700" y2="418" stroke="#bbb" stroke-width="1"/>
  <text x="380" y="434" text-anchor="middle" font-size="10.5" fill="#888">攻擊者能力愈強 → 疊愈多 RE → 同一條 SR 的門檻愈高（RE 是累加，非取代）</text>
</svg>

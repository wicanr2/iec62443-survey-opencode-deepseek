  <rect x="520" y="82" width="120" height="66" rx="2" fill="#f9ebea" stroke="#c0392b" stroke-width="0.8"/><text x="580" y="105" text-anchor="middle" font-size="9" fill="#555">硬體安全模組</text><text x="580" y="121" text-anchor="middle" font-size="9" fill="#555">生物辨識</text>

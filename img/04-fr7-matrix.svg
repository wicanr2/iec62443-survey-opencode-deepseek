  <rect x="62" y="50" width="120" height="28" rx="3" fill="#2c3e50"/><text x="122" y="69" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">根本問題</text>
  <rect x="184" y="50" width="90" height="28" rx="3" fill="#2c3e50"/><text x="229" y="69" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">核心控制</text>
  <rect x="276" y="50" width="120" height="28" rx="3" fill="#2c3e50"/><text x="336" y="69" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">SL 1-2 (基本)</text>
  <rect x="398" y="50" width="120" height="28" rx="3" fill="#2c3e50"/><text x="458" y="69" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">SL 2-3 (中/強)</text>
  <rect x="520" y="50" width="120" height="28" rx="3" fill="#2c3e50"/><text x="580" y="69" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">SL 3-4 (強/極)</text>
  <rect x="642" y="50" width="230" height="28" rx="3" fill="#2c3e50"/><text x="757" y="69" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">常見漏洞</text>

  <!-- FR1 -->
  <rect x="20" y="82" width="40" height="66" rx="2" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/><text x="40" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">FR1</text><text x="40" y="128" text-anchor="middle" font-size="8" fill="#555">IAC</text>
  <rect x="62" y="82" width="120" height="66" rx="2" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/><text x="122" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">你是誰？</text><text x="122" y="123" text-anchor="middle" font-size="9" fill="#777">識別與鑑別控制</text><text x="122" y="139" text-anchor="middle" font-size="9" fill="#999">人、程式、裝置</text>
  <rect x="184" y="82" width="90" height="66" rx="2" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/><text x="229" y="105" text-anchor="middle" font-size="9" fill="#555">帳密/憑證</text><text x="229" y="121" text-anchor="middle" font-size="9" fill="#555">MFA/HSM</text><text x="229" y="137" text-anchor="middle" font-size="9" fill="#555">裝置鑑別</text>
  <rect x="276" y="82" width="120" height="66" rx="2" fill="#e8f8f5" stroke="#27ae60" stroke-width="0.8"/><text x="336" y="105" text-anchor="middle" font-size="9" fill="#555">唯一識別</text><text x="336" y="121" text-anchor="middle" font-size="9" fill="#555">帳號密碼強度</text>

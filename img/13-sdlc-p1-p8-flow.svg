<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 600" width="680" height="600" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="680" height="600" fill="#fff"/>
  <text x="340" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">IEC 62443-4-1 八大 Practice 流程關係</text>
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker></defs>

  <rect x="180" y="50" width="320" height="45" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="340" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">P1 (SM) 安全管理</text>
  <text x="340" y="88" text-anchor="middle" font-size="9" fill="#555">政策、角色、資源 — 全流程骨架</text>

  <line x1="340" y1="95" x2="340" y2="115" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="180" y="120" width="320" height="45" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
  <text x="340" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">P2 (SPR) 安全需求</text>
  <text x="340" y="158" text-anchor="middle" font-size="9" fill="#555">威脅模型 → 安全需求規格</text>

  <line x1="340" y1="165" x2="340" y2="185" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="180" y="190" width="320" height="45" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
  <text x="340" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">P3 (SD) 安全設計</text>
  <text x="340" y="228" text-anchor="middle" font-size="9" fill="#555">STRIDE 威脅建模 → countermeasures</text>

  <line x1="340" y1="235" x2="340" y2="255" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="180" y="260" width="320" height="45" rx="8" fill="#e8f8f5" stroke="#27ae60" stroke-width="1.5"/>
  <text x="340" y="280" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">P4 (SImp) 安全實作</text>
  <text x="340" y="298" text-anchor="middle" font-size="9" fill="#555">安全編碼規範 + SAST + code review</text>

  <line x1="340" y1="305" x2="340" y2="325" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="180" y="330" width="320" height="45" rx="8" fill="#e8f8f5" stroke="#27ae60" stroke-width="1.5"/>
  <text x="340" y="350" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">P5 (SVV) 安全測試</text>
  <text x="340" y="368" text-anchor="middle" font-size="9" fill="#555">安全功能測試 + fuzz + pentest</text>

  <line x1="340" y1="375" x2="340" y2="395" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="180" y="400" width="320" height="45" rx="8" fill="#f9ebea" stroke="#c0392b" stroke-width="1.5"/>
  <text x="340" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">P6 (DM) 缺陷管理</text>
  <text x="340" y="438" text-anchor="middle" font-size="9" fill="#555">漏洞通報 → Triage → 修復 → 回歸</text>

  <line x1="340" y1="445" x2="340" y2="465" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="180" y="470" width="320" height="45" rx="8" fill="#f9ebea" stroke="#c0392b" stroke-width="1.5"/>
  <text x="340" y="490" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">P7 (SUM) 安全更新</text>
  <text x="340" y="508" text-anchor="middle" font-size="9" fill="#555">簽章 patch + 反回滾 + 客戶通知</text>

  <line x1="340" y1="515" x2="340" y2="535" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="180" y="540" width="320" height="45" rx="8" fill="#f4f6f6" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="340" y="560" text-anchor="middle" font-size="12" font-weight="bold" fill="#7f8c8d">P8 (SG) 安全指引</text>
  <text x="340" y="578" text-anchor="middle" font-size="9" fill="#555">hardening guide + 安全功能說明書</text>

  <!-- Loopback arrow P6→P5 -->
  <path d="M500,422 Q570,422 570,370 Q570,352 500,352" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <text x="582" y="392" font-size="9" fill="#c0392b">持續</text>
  <text x="582" y="404" font-size="9" fill="#c0392b">循環</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" width="720" height="460" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="720" height="460" fill="#fff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">HSM / TPM / Secure Element 選用決策樹</text>
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker></defs>

  <!-- Root -->
  <rect x="210" y="48" width="300" height="36" rx="18" fill="#2c3e50"/>
  <text x="360" y="72" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">你要保護的是什麼？</text>
  <line x1="360" y1="84" x2="360" y2="110" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- Branch: Platform Identity -->
  <rect x="40" y="115" width="200" height="36" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="140" y="139" text-anchor="middle" font-size="11" fill="#2980b9" font-weight="bold">平台身分 (attestation)</text>
  <line x1="140" y1="151" x2="140" y2="175" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <rect x="40" y="180" width="200" height="40" rx="8" fill="#e8f8f5" stroke="#27ae60" stroke-width="2"/>
  <text x="140" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">→ TPM</text>
  <text x="140" y="215" text-anchor="middle" font-size="9" fill="#555">(或 firmware TPM)</text>

  <!-- Branch: Device Private Key -->
  <rect x="260" y="115" width="200" height="36" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="360" y="139" text-anchor="middle" font-size="11" fill="#2980b9" font-weight="bold">裝置私鑰 (憑證/TLS)</text>
  <line x1="360" y1="151" x2="360" y2="175" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- Sub: Resource constrained MCU -->
  <rect x="260" y="180" width="200" height="36" rx="6" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
  <text x="360" y="204" text-anchor="middle" font-size="11" fill="#e67e22" font-weight="bold">資源受限 MCU？</text>
  <line x1="360" y1="216" x2="360" y2="240" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- Sub-result: SE -->
  <rect x="260" y="245" width="95" height="45" rx="6" fill="#e8f8f5" stroke="#27ae60" stroke-width="1.2"/>
  <text x="307" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">Yes → SE</text>
  <text x="307" y="282" text-anchor="middle" font-size="8" fill="#555">ATECC608</text>

  <!-- Sub: Linux embedded -->
  <rect x="365" y="245" width="95" height="45" rx="6" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.2"/>
  <text x="412" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">No →</text>
  <text x="412" y="282" text-anchor="middle" font-size="8" fill="#555">Linux?</text>

  <line x1="307" y1="290" x2="307" y2="320" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="412" y1="290" x2="412" y2="305" stroke="#555" stroke-width="1.5"/>

  <!-- Bottom results -->
  <rect x="40" y="325" width="140" height="55" rx="6" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="110" y="348" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">需 platform attest?</text>
  <text x="110" y="366" text-anchor="middle" font-size="9" fill="#999">Yes → TPM + SE</text>
  <text x="110" y="378" text-anchor="middle" font-size="9" fill="#999">No → TPM only</text>

  <rect x="200" y="325" width="150" height="55" rx="6" fill="#e8f8f5" stroke="#27ae60" stroke-width="1.5"/>
  <text x="275" y="348" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">SE</text>
  <text x="275" y="365" text-anchor="middle" font-size="9" fill="#555">I2C 介面, $0.3-1</text>
  <text x="275" y="378" text-anchor="middle" font-size="8" fill="#999">ARM Cortex-M 等 MCU</text>

  <rect x="370" y="325" width="150" height="55" rx="6" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="445" y="348" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">TPM</text>
  <text x="445" y="365" text-anchor="middle" font-size="9" fill="#555">SPI/LPC, $1-3</text>
  <text x="445" y="378" text-anchor="middle" font-size="8" fill="#999">Linux SBC / Server</text>

  <!-- Branch: Enterprise PKI -->
  <rect x="480" y="115" width="200" height="36" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="580" y="139" text-anchor="middle" font-size="11" fill="#2980b9" font-weight="bold">企業級 PKI / CA</text>
  <line x1="580" y1="151" x2="580" y2="175" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <rect x="480" y="180" width="200" height="40" rx="8" fill="#f9ebea" stroke="#c0392b" stroke-width="2"/>
  <text x="580" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">→ External HSM</text>
  <text x="580" y="215" text-anchor="middle" font-size="9" fill="#555">FIPS 140-2 L3, PCIe/USB/Network</text>

  <!-- Connecting lines -->
  <line x1="360" y1="110" x2="140" y2="115" stroke="#555" stroke-width="1.5"/>
  <line x1="360" y1="110" x2="580" y2="115" stroke="#555" stroke-width="1.5"/>
</svg>

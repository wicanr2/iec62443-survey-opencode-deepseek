<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" width="820" height="430" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="ai" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/></marker>
  </defs>
  <rect width="820" height="430" fill="#ffffff"/>
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">IIoT 打破 62443 的「封閉盒子」假設</text>

  <!-- LEFT: traditional IACS closed box -->
  <text x="205" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#2980b9">傳統 IACS：封閉盒子</text>
  <!-- perimeter -->
  <rect x="45" y="78" width="320" height="215" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="3"/>
  <text x="205" y="100" text-anchor="middle" font-size="11" fill="#2980b9">單一防護邊界（firewall）</text>
  <!-- devices inside -->
  <rect x="75" y="120" width="80" height="46" rx="6" fill="#ffffff" stroke="#2980b9" stroke-width="1.2"/>
  <text x="115" y="148" text-anchor="middle" font-size="12" fill="#555">PLC</text>
  <rect x="175" y="120" width="80" height="46" rx="6" fill="#ffffff" stroke="#2980b9" stroke-width="1.2"/>
  <text x="215" y="148" text-anchor="middle" font-size="12" fill="#555">HMI</text>
  <rect x="275" y="120" width="70" height="46" rx="6" fill="#ffffff" stroke="#2980b9" stroke-width="1.2"/>
  <text x="310" y="148" text-anchor="middle" font-size="12" fill="#555">感測</text>
  <text x="205" y="205" text-anchor="middle" font-size="11.5" fill="#666">✓ 隔離、靜態 zone</text>
  <text x="205" y="226" text-anchor="middle" font-size="11.5" fill="#666">✓ 排程停機人工 patch</text>
  <text x="205" y="247" text-anchor="middle" font-size="11.5" fill="#666">✓ 算力充足、資產有限</text>
  <text x="205" y="275" text-anchor="middle" font-size="11" fill="#2980b9">守住邊界 = 守住系統</text>

  <!-- RIGHT: IIoT broken box -->
  <text x="615" y="62" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">IIoT：盒子破了</text>
  <!-- cloud -->
  <ellipse cx="615" cy="105" rx="90" ry="30" fill="#f5eef8" stroke="#8e44ad" stroke-width="1.8"/>
  <text x="615" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">雲端 / 網際網路</text>
  <!-- broken dashed perimeter -->
  <rect x="455" y="150" width="320" height="145" rx="10" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="8,6"/>
  <text x="468" y="170" text-anchor="start" font-size="10" fill="#c0392b">動態邊界（持續移動）</text>
  <!-- gateway -->
  <rect x="565" y="185" width="100" height="40" rx="6" fill="#ffffff" stroke="#8e44ad" stroke-width="1.4"/>
  <text x="615" y="210" text-anchor="middle" font-size="11.5" fill="#555">閘道 gateway</text>
  <!-- devices -->
  <rect x="475" y="245" width="66" height="38" rx="6" fill="#ffffff" stroke="#c0392b" stroke-width="1"/>
  <text x="508" y="269" text-anchor="middle" font-size="10.5" fill="#666">edge</text>
  <rect x="582" y="245" width="66" height="38" rx="6" fill="#ffffff" stroke="#c0392b" stroke-width="1"/>
  <text x="615" y="269" text-anchor="middle" font-size="10.5" fill="#666">感測</text>
  <rect x="689" y="245" width="66" height="38" rx="6" fill="#ffffff" stroke="#c0392b" stroke-width="1"/>
  <text x="722" y="269" text-anchor="middle" font-size="10.5" fill="#666">裝置</text>
  <!-- arrows device->gateway->cloud -->
  <line x1="615" y1="245" x2="615" y2="226" stroke="#8e44ad" stroke-width="1.4" marker-end="url(#ai)"/>
  <line x1="615" y1="185" x2="615" y2="137" stroke="#c0392b" stroke-width="1.6" marker-end="url(#ai)"/>
  <text x="670" y="163" font-size="10" fill="#c0392b">直連雲 · OTA 更新</text>

  <!-- broken assumptions banner -->
  <rect x="45" y="315" width="730" height="95" rx="10" fill="#fdecea" stroke="#c0392b" stroke-width="1.3"/>
  <text x="410" y="337" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#c0392b">鬆動的三個假設</text>
  <text x="70" y="360" font-size="11" fill="#555">① 單一 perimeter → 失效，逼向 Zero Trust（每個連線不預設信任）</text>
  <text x="70" y="381" font-size="11" fill="#555">② 靜態完全隔離 → 不可能：邊界隨裝置移動、大規模異質</text>
  <text x="70" y="402" font-size="11" fill="#555">③ 排程停機 patch → 改 FOTA 空中更新；算力受限讓強加密變難</text>
</svg>
